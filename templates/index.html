<!DOCTYPE html>
<html>
<head>

<title>AI Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
}

.container{
width:420px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,0,0,0.4);
text-align:center;
color:white;
}

h1{
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:10px;
padding:10px;
margin-top:10px;
font-size:14px;
outline:none;
resize:none;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.output{
margin-top:20px;
padding:10px;
border-radius:10px;
background:rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="container">

<h1>🌐 English → Hindi Translator</h1>

<form method="POST">

<textarea name="text" placeholder="Type text in English..."></textarea>

<button type="submit">Translate</button>

</form>

<div class="output">

<h3>Translated Text</h3>

<p>{{ translated }}</p>

</div>

</div>

</body>
</html>
